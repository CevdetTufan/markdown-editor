<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MarkdownForge is a premium, browser-based Markdown editor featuring live preview, syntax highlighting, dark mode, and HTML/PDF export.">
    <meta name="keywords" content="markdown editor, online markdown, live preview, markdown to pdf, markdown to html, browser based editor, MarkdownForge, free markdown editor">
    <meta name="author" content="Cevdet Tufan">
    <title>MarkdownForge - Premium Editor</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Highlight.js Theme (Atom One Dark) -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <i class="fa-brands fa-markdown"></i>
                <h1>Markdown<span>Forge</span></h1>
            </div>
            <div class="toolbar">
                <a href="https://github.com/CevdetTufan/markdown-editor" target="_blank" rel="noopener noreferrer"
                    class="btn" title="View on GitHub">
                    <i class="fa-brands fa-github"></i>
                </a>
                <button id="btn-theme" class="btn" title="Toggle Light/Dark Theme">
                    <i class="fa-solid fa-sun"></i>
                </button>
                <button id="btn-copy" class="btn" title="Copy Output HTML">
                    <i class="fa-regular fa-copy"></i>
                    <span>Copy HTML</span>
                </button>
                <button id="btn-download" class="btn btn-primary" title="Download Markdown File">
                    <i class="fa-solid fa-download"></i>
                    <span>Download .md</span>
                </button>
                <button id="btn-download-pdf" class="btn btn-primary" title="Download PDF File" style="background-color: var(--accent-color); border-color: var(--accent-color);">
                    <i class="fa-solid fa-file-pdf"></i>
                    <span>Download PDF</span>
                </button>
                <button id="btn-clear" class="btn btn-danger" title="Clear Editor">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
            </div>
        </header>

        <main class="main-content">
            <div class="pane editor-pane" id="editor-pane">
                <div class="pane-header">
                    <i class="fa-solid fa-code"></i> Editor
                </div>
                <textarea id="editor" placeholder="Start typing your Markdown here..."></textarea>
            </div>

            <div class="resizer" id="resizer"></div>

            <div class="pane preview-pane" id="preview-pane">
                <div class="pane-header">
                    <i class="fa-solid fa-eye"></i> Preview
                </div>
                <div id="preview" class="markdown-body"></div>
            </div>
        </main>
    </div>

    <!-- External Libraries (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    
    <!-- PDF Generation Libraries (Text-based, no print dialog) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html-to-pdfmake/browser.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@twemoji/api@14.1.0/dist/twemoji.min.js"></script>

    <!-- Custom JS -->
    <script>
document.addEventListener('DOMContentLoaded', () => {
    // --- Elements ---
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const btnCopy = document.getElementById('btn-copy');
    const btnDownload = document.getElementById('btn-download');
    const btnDownloadPdf = document.getElementById('btn-download-pdf');
    const btnClear = document.getElementById('btn-clear');
    const btnTheme = document.getElementById('btn-theme');
    // --- Initialize Marked.js with Highlight.js ---
    marked.setOptions({
        highlight: function (code, lang) {
            const language = hljs.getLanguage(lang) ? lang : 'plaintext';
            return hljs.highlight(code, { language }).value;
        },
        langPrefix: 'hljs language-',
        gfm: true,
        breaks: true,
    });

    // --- Core Functions ---
    const renderMarkdown = () => {
        const markdownText = editor.value;
        // Parse markdown to HTML
        const rawHtml = marked.parse(markdownText);
        // Sanitize HTML to prevent XSS
        const cleanHtml = DOMPurify.sanitize(rawHtml);
        // Render in preview
        preview.innerHTML = cleanHtml;
        // Save to local storage
        localStorage.setItem('markdown-forge-content', markdownText);
    };

    const showNotification = (message, isError = false) => {
        // Remove existing notification if any
        const existing = document.querySelector('.notification');
        if (existing) existing.remove();

        const notif = document.createElement('div');
        notif.className = 'notification';
        if (isError) notif.style.backgroundColor = 'var(--danger-color)';
        notif.textContent = message;
        
        document.body.appendChild(notif);
        
        // Trigger reflow for animation
        setTimeout(() => notif.classList.add('show'), 10);
        
        // Hide after 3 seconds
        setTimeout(() => {
            notif.classList.remove('show');
            setTimeout(() => notif.remove(), 300);
        }, 3000);
    };

    // --- Event Listeners ---

    // 1. Live Typing
    editor.addEventListener('input', renderMarkdown);

    // 2. Synchronized Scrolling
    editor.addEventListener('scroll', () => {
        // Calculate percentage scrolled
        const percentage = editor.scrollTop / (editor.scrollHeight - editor.clientHeight);
        // Apply percentage to preview pane
        preview.scrollTop = percentage * (preview.scrollHeight - preview.clientHeight);
    });

    // 3. Toolbar: Copy HTML
    btnCopy.addEventListener('click', () => {
        const htmlContent = preview.innerHTML;
        navigator.clipboard.writeText(htmlContent).then(() => {
            showNotification('HTML Copied to Clipboard!');
        }).catch(err => {
            showNotification('Failed to copy text', true);
            console.error('Could not copy text: ', err);
        });
    });

    // 4. Toolbar: Download .md
    btnDownload.addEventListener('click', () => {
        const markdownText = editor.value;
        const blob = new Blob([markdownText], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = 'document.md';
        document.body.appendChild(a);
        a.click();
        
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        showNotification('File Downloaded!');
    });

    // 4.5. Toolbar: Download PDF
    btnDownloadPdf.addEventListener('click', async () => {
        showNotification('Generating PDF...');
        
        try {
            // Clone preview to process images without affecting UI
            const clone = preview.cloneNode(true);
            
            // Parse emojis into images so PDFMake can render them
            if (window.twemoji) {
                twemoji.parse(clone, {
                    base: 'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/',
                    folder: '72x72',
                    ext: '.png'
                });
                // Fix emoji sizes for PDF
                clone.querySelectorAll('.emoji').forEach(img => {
                    img.style.width = '12px';
                    img.style.height = '12px';
                    img.style.margin = '0 2px';
                    img.style.verticalAlign = '-2px';
                });
            }

            const images = clone.querySelectorAll('img');
            
            // Convert all images to Base64 to avoid pdfMake virtual file system errors
            const promises = Array.from(images).map(img => {
                return new Promise((resolve) => {
                    const imgObj = new Image();
                    imgObj.crossOrigin = 'Anonymous';
                    imgObj.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = imgObj.naturalWidth || imgObj.width;
                        canvas.height = imgObj.naturalHeight || imgObj.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(imgObj, 0, 0);
                        try {
                            img.src = canvas.toDataURL('image/png');
                            resolve();
                        } catch (e) {
                            img.remove(); // Remove if CORS blocks canvas read
                            resolve();
                        }
                    };
                    imgObj.onerror = () => {
                        img.remove(); // Remove broken images
                        resolve();
                    };
                    imgObj.src = img.src;
                });
            });
            
            await Promise.all(promises);
            
            const htmlContent = clone.innerHTML;
            
            // Convert HTML to pdfmake format, preserving styles via window object
            const pdfContent = htmlToPdfmake(htmlContent, {
                window: window,
                tableAutoSize: true
            });
            
            const docDefinition = {
                content: pdfContent,
                pageSize: 'A4',
                pageMargins: [ 40, 60, 40, 60 ],
                defaultStyle: {
                    fontSize: 11
                }
            };
            
            pdfMake.createPdf(docDefinition).getBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'document.pdf';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showNotification('PDF Downloaded!');
            });
        } catch (err) {
            showNotification('Failed to generate PDF', true);
            console.error(err);
        }
    });

    // 5. Toolbar: Clear Editor
    btnClear.addEventListener('click', () => {
        if (confirm('Are you sure you want to clear the editor? All un-downloaded progress will be lost.')) {
            editor.value = '';
            renderMarkdown();
            showNotification('Editor cleared');
        }
    });

    // 6. Handle Tab Key in Editor
    editor.addEventListener('keydown', function(e) {
        if (e.key === 'Tab') {
            e.preventDefault();
            const start = this.selectionStart;
            const end = this.selectionEnd;

            // Set textarea value to: text before caret + tab + text after caret
            this.value = this.value.substring(0, start) + "\t" + this.value.substring(end);

            // Put caret at right position again
            this.selectionStart = this.selectionEnd = start + 1;
            
            // Trigger render
            renderMarkdown();
        }
    });

    // 7. Resizer Logic
    const resizer = document.getElementById('resizer');
    const editorPane = document.getElementById('editor-pane');
    const mainContent = document.querySelector('.main-content');
    
    let isResizing = false;

    resizer.addEventListener('mousedown', (e) => {
        isResizing = true;
        document.body.style.cursor = 'col-resize';
        // Prevent text selection during resize
        document.body.style.userSelect = 'none';
    });

    document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        
        // Calculate new width based on mouse position relative to container
        const containerRect = mainContent.getBoundingClientRect();
        let newWidth = e.clientX - containerRect.left;
        
        // Constrain width between 20% and 80%
        const minWidth = containerRect.width * 0.2;
        const maxWidth = containerRect.width * 0.8;
        
        if (newWidth < minWidth) newWidth = minWidth;
        if (newWidth > maxWidth) newWidth = maxWidth;
        
        // Apply new width percentage
        const widthPercentage = (newWidth / containerRect.width) * 100;
        editorPane.style.width = `${widthPercentage}%`;
    });

    document.addEventListener('mouseup', () => {
        if (isResizing) {
            isResizing = false;
            document.body.style.cursor = 'default';
            document.body.style.userSelect = 'auto';
        }
    });

    // 8. Theme Toggle Logic
    const themeIcon = btnTheme.querySelector('i');
    
    const updateThemeIcon = (theme) => {
        if (theme === 'dark') {
            themeIcon.className = 'fa-solid fa-sun';
        } else {
            themeIcon.className = 'fa-solid fa-moon';
        }
    };

    btnTheme.addEventListener('click', () => {
        const currentTheme = document.body.getAttribute('data-theme') || 'dark';
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        
        document.body.setAttribute('data-theme', newTheme);
        localStorage.setItem('markdown-forge-theme', newTheme);
        updateThemeIcon(newTheme);
    });

    // --- Initialization ---
    const init = () => {
        // Load theme
        const savedTheme = localStorage.getItem('markdown-forge-theme') || 'dark';
        document.body.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        const savedContent = localStorage.getItem('markdown-forge-content');
        if (savedContent) {
            editor.value = savedContent;
        } else {
            // Default placeholder content
            editor.value = `# Welcome to MarkdownForge\n\nA beautiful, browser-based Markdown editor.\n\n## Features\n\n- 🌙 Premium Dark Mode\n- ⚡ Live Preview\n- 💾 Auto-saving to browser\n- 🎨 Syntax Highlighting\n- ⬇️ Download as \`.md\`\n\n### Code Example\n\n\`\`\`javascript\nconst greet = () => {\n  console.log("Hello, world!");\n};\n\`\`\`\n\n> "Simplicity is the ultimate sophistication." - Leonardo da Vinci\n`;
        }
        renderMarkdown();
    };

    init();
});
    </script>
</body>

</html>
